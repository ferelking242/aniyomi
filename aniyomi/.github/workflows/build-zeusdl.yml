name: Build ZeusDL Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            target: aarch64-linux-android
            ndk_target: aarch64-linux-android
          - arch: armeabi-v7a
            target: armv7a-linux-androideabi
            ndk_target: arm-linux-androideabi
          - arch: x86_64
            target: x86_64-linux-android
            ndk_target: x86_64-linux-android

    steps:
      - name: Checkout ZeusDL source
        uses: actions/checkout@v4
        with:
          repository: aniyomiorg/zeusdl
          token: ${{ secrets.ZEUS_GITHUB_PAT }}
          path: zeusdl

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Configure Cargo for Android cross-compilation
        run: |
          ANDROID_API=21
          NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF
          [target.${{ matrix.target }}]
          linker = "${TOOLCHAIN}/bin/${{ matrix.ndk_target }}${ANDROID_API}-clang"
          EOF

      - name: Build ZeusDL for ${{ matrix.arch }}
        working-directory: zeusdl
        env:
          CARGO_TARGET_DIR: target
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/zeusdl zeusdl-${{ matrix.arch }}
          strip zeusdl-${{ matrix.arch }} || true

      - name: Generate SHA256 checksum
        run: |
          sha256sum zeusdl/zeusdl-${{ matrix.arch }} > zeusdl/zeusdl-${{ matrix.arch }}.sha256
          echo "SHA256: $(cat zeusdl/zeusdl-${{ matrix.arch }}.sha256)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-${{ matrix.arch }}
          path: |
            zeusdl/zeusdl-${{ matrix.arch }}
            zeusdl/zeusdl-${{ matrix.arch }}.sha256

  build-desktop:
    name: Build Desktop (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: zeusdl-linux-x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zeusdl-windows-x86_64.exe
          - os: macos
            arch: aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact: zeusdl-macos-aarch64
          - os: macos
            arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            artifact: zeusdl-macos-x86_64

    steps:
      - name: Checkout ZeusDL source
        uses: actions/checkout@v4
        with:
          repository: aniyomiorg/zeusdl
          token: ${{ secrets.ZEUS_GITHUB_PAT }}
          path: zeusdl

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get install -y musl-tools

      - name: Build ZeusDL
        working-directory: zeusdl
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Copy and strip binary (Unix)
        if: matrix.os != 'windows'
        working-directory: zeusdl
        run: |
          cp target/${{ matrix.target }}/release/zeusdl ${{ matrix.artifact }}
          strip ${{ matrix.artifact }} || true
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Copy binary (Windows)
        if: matrix.os == 'windows'
        working-directory: zeusdl
        shell: pwsh
        run: |
          Copy-Item target\${{ matrix.target }}\release\zeusdl.exe ${{ matrix.artifact }}
          $hash = (Get-FileHash ${{ matrix.artifact }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -FilePath "${{ matrix.artifact }}.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            zeusdl/${{ matrix.artifact }}
            zeusdl/${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ZeusDL ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.ZEUS_GITHUB_PAT }}
