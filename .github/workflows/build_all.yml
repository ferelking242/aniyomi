name: Build All Architectures

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZEUS_REPO: aniyomiorg/zeusdl

jobs:
  build:
    name: Build all variants
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Download ZeusDL binaries from release
        env:
          ZEUS_PAT: ${{ secrets.ZEUS_GITHUB_PAT }}
        run: |
          RELEASE_JSON=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${ZEUS_PAT:+-H "Authorization: Bearer $ZEUS_PAT"} \
            "https://api.github.com/repos/$ZEUS_REPO/releases/latest" 2>/dev/null) || {
            echo "Could not fetch ZeusDL releases (repo may be private or unavailable) — skipping"
            exit 0
          }

          ZEUS_VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')
          if [ -z "$ZEUS_VERSION" ]; then
            echo "No ZeusDL release found — skipping"
            exit 0
          fi
          echo "ZeusDL version: $ZEUS_VERSION"

          for ARCH in arm64-v8a armeabi-v7a x86_64 x86; do
            DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r \
              ".assets[] | select(.name | contains(\"$ARCH\")) | select(.name | endswith(\".sha256\") | not) | .browser_download_url")

            if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
              echo "No binary found for $ARCH — skipping"
              continue
            fi

            DEST="app/src/main/assets/zeus/$ARCH"
            mkdir -p "$DEST"

            echo "Downloading $ARCH from $DOWNLOAD_URL"
            curl -sfL \
              ${ZEUS_PAT:+-H "Authorization: Bearer $ZEUS_PAT"} \
              -o "$DEST/zeusdl" \
              "$DOWNLOAD_URL"
            chmod +x "$DEST/zeusdl"

            SHA_URL=$(echo "$RELEASE_JSON" | jq -r \
              ".assets[] | select(.name | contains(\"$ARCH\")) | select(.name | endswith(\".sha256\")) | .browser_download_url")

            if [ -n "$SHA_URL" ] && [ "$SHA_URL" != "null" ]; then
              EXPECTED=$(curl -sfL \
                ${ZEUS_PAT:+-H "Authorization: Bearer $ZEUS_PAT"} \
                "$SHA_URL" | awk '{print $1}')
              ACTUAL=$(sha256sum "$DEST/zeusdl" | awk '{print $1}')
              if [ "$EXPECTED" = "$ACTUAL" ]; then
                echo "  SHA256 OK for $ARCH"
              else
                echo "  SHA256 MISMATCH for $ARCH (expected $EXPECTED, got $ACTUAL)"
                exit 1
              fi
            fi
          done

          echo "ZEUS_VERSION=$ZEUS_VERSION" >> $GITHUB_ENV

      - name: Build release (all architectures)
        run: ./gradlew assembleRelease

      - name: Build debug (all architectures)
        run: ./gradlew assembleDebug

      - name: Upload release APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-apks-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload debug APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: debug-apks-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
